name: Scrape ss.ge prices and rents

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC (10:00 Tbilisi)
  workflow_dispatch:       # Allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run sales price scraper
        run: python scripts/scrape_prices.py

      - name: Run rental price scraper
        run: python scripts/scrape_rents.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/history.json data/rents.json data/rent_history.json data/listings.json
          if git diff --staged --quiet; then
            echo "No price changes this week."
          else
            git commit -m "chore: weekly price update [skip ci]"
            git push
          fi
